<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Resume Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 500px; width: 90%; }
        h1 { color: #667eea; text-align: center; margin-bottom: 30px; font-size: 28px; }
        .upload-area { border: 3px dashed #667eea; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { background: #f8f9ff; border-color: #764ba2; }
        .upload-icon { font-size: 50px; color: #667eea; margin-bottom: 15px; }
        input[type="file"] { display: none; }
        .file-name { margin-top: 15px; color: #666; font-size: 14px; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { background: #fee; color: #c33; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #c33; }
        .info { color: #666; font-size: 13px; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Smart Resume Analyzer</h1>
        
        <div th:if="${error}" class="error" th:text="${error}"></div>
        
        <form action="/analyze" method="post" enctype="multipart/form-data" id="uploadForm">
            <label for="fileInput">
                <div class="upload-area">
                    <div class="upload-icon">📤</div>
                    <h3>Click to Upload Resume</h3>
                    <p style="color: #999; margin-top: 10px;">Supports PDF, DOCX, TXT</p>
                    <div class="file-name" id="fileName"></div>
                </div>
            </label>
            <input type="file" id="fileInput" name="file" accept=".pdf,.docx,.txt" required>
            <button type="submit" id="submitBtn" disabled>Analyze Resume</button>
        </form>
        
        <p class="info">Upload your resume to get instant analysis and improvement suggestions</p>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                fileName.textContent = '✓ ' + this.files[0].name;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
